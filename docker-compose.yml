services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hourflow_app
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    networks:
      - hourflow

  webserver:
    image: nginx:stable-alpine
    container_name: hourflow_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hourflow

  db:
    image: mysql:8.0
    container_name: hourflow_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - hourflow_db_data:/var/lib/mysql
      - ./hourflow.sql:/docker-entrypoint-initdb.d/hourflow.sql
    networks:
      - hourflow

networks:
  hourflow:
    driver: bridge

volumes:
  hourflow_db_data: